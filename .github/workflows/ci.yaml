name: Contract Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  contract-gate:
    name: Run contract gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run contract checker
        id: contract_check
        continue-on-error: true
        run: python src/check_contract.py

      - name: Upload contract summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-contract-summary
          path: artifacts/check_contract_summary.json
          if-no-files-found: warn

      - name: Post contract gate file comments
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -f artifacts/check_contract_summary.json ]; then
            python src/post_pr_review_comments.py
          else
            echo "No contract summary written; skipping PR review comments."
          fi

      - name: Enforce contract gate result
        if: always()
        run: |
