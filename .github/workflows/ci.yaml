name: Contract Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-gate:
    name: Run contract gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run contract checker
        run: python src/check_contract.py

      - name: Upload contract summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-contract-summary
          path: artifacts/check_contract_summary.json
          if-no-files-found: warn
